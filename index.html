<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>人と箱のサイズ比較</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 30px;
    }
    h2 {
      margin-top: 0;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 25px;
    }
    label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }
    input {
      width: 90px;
      padding: 6px;
      font-size: 16px;
    }
    button {
      padding: 8px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    #scene {
      display: flex;
      align-items: flex-end;
      gap: 60px;
      min-height: 520px;
      padding: 20px;
      border: 1px solid #ccc;
      background: white;
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #humanSvg {
      width: 120px;
    }
    #box {
      background: #4CAF50;
      border: 2px solid #2E7D32;
      box-sizing: border-box;
    }
    .label {
      margin-top: 10px;
      text-align: center;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2>人と箱のサイズ比較</h2>

  <div class="controls">
    <label>人の身長(cm)<input id="humanHeight" type="number" value="170"></label>
    <label>箱の高さ(cm)<input id="boxHeight" type="number" value="120"></label>
    <label>箱の幅(cm)<input id="boxWidth" type="number" value="80"></label>
    <button onclick="draw()">表示更新</button>
  </div>

  <div id="scene">
    <div class="item">
      <svg id="humanSvg" viewBox="0 0 100 300">
        <circle cx="50" cy="30" r="18" fill="#FFD6B3" stroke="#333" stroke-width="3" />
        <line x1="50" y1="48" x2="50" y2="160" stroke="#333" stroke-width="8" />
        <line x1="20" y1="90" x2="80" y2="90" stroke="#333" stroke-width="8" />
        <line x1="50" y1="160" x2="25" y2="280" stroke="#333" stroke-width="8" />
        <line x1="50" y1="160" x2="75" y2="280" stroke="#333" stroke-width="8" />
      </svg>
      <div class="label" id="humanLabel"></div>
    </div>

    <div class="item">
      <div id="box"></div>
      <div class="label" id="boxLabel"></div>
    </div>
  </div>

  <script>
    function draw() {
      // 画面から各入力値を取得
      const humanHeight = Number(document.getElementById("humanHeight").value);
      const boxHeight = Number(document.getElementById("boxHeight").value);
      const boxWidth = Number(document.getElementById("boxWidth").value);

      // 人の表示高さ(px)
      const humanPixelHeight = 420;

      // 1cmあたり何pxか
      const scale = humanPixelHeight / humanHeight;

      // 人
      document.getElementById("humanSvg").style.height = humanPixelHeight + "px";

      // 箱
      document.getElementById("box").style.height = (boxHeight * scale) + "px";
      document.getElementById("box").style.width = (boxWidth * scale) + "px";

      // ラベル
      document.getElementById("humanLabel").textContent = `人 ${humanHeight} cm`;
      document.getElementById("boxLabel").textContent = `${boxWidth} × ${boxHeight} cm`;
    }

    draw();
  </script>

</body>
</html>
