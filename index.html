```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人と箱のサイズ比較</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:30px;
}

h2{
    margin-top:0;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    align-items:flex-end;
    margin-bottom:25px;
}

label{
    display:flex;
    flex-direction:column;
    font-size:14px;
}

input{
    width:90px;
    padding:6px;
    font-size:16px;
}

button{
    padding:8px 18px;
    font-size:16px;
    cursor:pointer;
}

#scene{
    position:relative;
    display:flex;
    align-items:flex-end;
    gap:60px;

    width:100%;
    min-height:520px;

    padding:20px;
    box-sizing:border-box;

    border:1px solid #ccc;
    background:#fff;
}

/* 床 */
#floor{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;

    height:3px;
    background:#444;
}

.item{
    position:relative;
    z-index:2;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
}

#personImage{
    display:block;
    width:auto;
}

#box{
    background:#4CAF50;
    border:2px solid #2E7D32;
    box-sizing:border-box;
}

.label{
    margin-top:10px;
    text-align:center;
    font-size:15px;
}
</style>
</head>

<body>

<h2>人と箱のサイズ比較</h2>

<div class="controls">

<label>
人の身長(cm)
<input id="humanHeight" type="number" value="170">
</label>

<label>
箱の高さ(cm)
<input id="boxHeight" type="number" value="120">
</label>

<label>
箱の幅(cm)
<input id="boxWidth" type="number" value="80">
</label>

<button onclick="draw()">表示更新</button>

</div>

<div id="scene">

<div class="item">

<img
    id="personImage"
    src="person.png"
    alt="person">

<div class="label" id="humanLabel"></div>

</div>

<div class="item">

<div id="box"></div>

<div class="label" id="boxLabel"></div>

</div>

<div id="floor"></div>

</div>

<script>

function draw(){

    const humanHeight =
        Number(document.getElementById("humanHeight").value);

    const boxHeight =
        Number(document.getElementById("boxHeight").value);

    const boxWidth =
        Number(document.getElementById("boxWidth").value);

    // 人画像の高さ(px)を固定
    const personPixelHeight = 420;

    // 1cmあたり何pxか
    const pxPerCm = personPixelHeight / humanHeight;

    // 人画像
    const person =
        document.getElementById("personImage");

    person.style.height =
        personPixelHeight + "px";

    person.style.width = "auto";

    // 箱
    const box =
        document.getElementById("box");

    box.style.height =
        (boxHeight * pxPerCm) + "px";

    box.style.width =
        (boxWidth * pxPerCm) + "px";

    // ラベル
    document.getElementById("humanLabel").textContent =
        `人：${humanHeight} cm`;

    document.getElementById("boxLabel").textContent =
        `箱：${boxWidth} × ${boxHeight} cm`;

}

draw();

</script>

</body>
</html>
```
