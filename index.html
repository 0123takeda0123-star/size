<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人と箱のサイズ比較</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:30px;
}

h2{
    margin-top:0;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    align-items:flex-end;
    margin-bottom:25px;
}

label{
    display:flex;
    flex-direction:column;
    font-size:14px;
}

input{
    width:90px;
    padding:6px;
    font-size:16px;
}

button{
    padding:8px 18px;
    font-size:16px;
    cursor:pointer;
}

#scene{
    position:relative;
    width:100%;
    min-height:520px;
    padding:20px;
    box-sizing:border-box;
    border:1px solid #ccc;
    background:#fff;
    overflow:hidden;
}

/* 床 */
#floor{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;
    height:3px;
    background:#444;
}

/* 人 */
#person{
    position:absolute;
    left:40px;
    bottom:23px;
    z-index:2;
    text-align:center;
}

#personImage{
    display:block;
    width:auto;
}

#humanLabel{
    margin-top:8px;
    text-align:center;
}

/* 箱 */
#box{
    position:absolute;
    left:260px;
    bottom:23px;

    background:#4CAF50;
    border:2px solid #2E7D32;
    box-sizing:border-box;

    cursor:move;
    user-select:none;
    z-index:5;
}

#boxLabel{
    position:absolute;
    text-align:center;
    font-size:14px;
}
</style>
</head>

<body>

<h2>人と箱のサイズ比較</h2>

<div class="controls">

<label>
人の身長(cm)
<input id="humanHeight" type="number" value="170">
</label>

<label>
箱の高さ(cm)
<input id="boxHeight" type="number" value="120">
</label>

<label>
箱の幅(cm)
<input id="boxWidth" type="number" value="80">
</label>

<button onclick="draw()">表示更新</button>

</div>

<div id="scene">

<div id="person">
     <div id="humanLabel"></div>
    <img id="personImage" src="person.png" alt="person">
   
</div>

<div id="boxLabel"></div>
    <div id="box"></div>


<div id="floor"></div>

</div>

<script>

// 人画像の表示高さ(px)
const PERSON_PIXEL_HEIGHT = 420;

// 箱の現在位置
let boxLeft = 260;
let boxBottom = 23;

const person = document.getElementById("personImage");
const box = document.getElementById("box");
const label = document.getElementById("boxLabel");

function draw(){

    const humanHeight =
        Number(document.getElementById("humanHeight").value);

    const boxHeight =
        Number(document.getElementById("boxHeight").value);

    const boxWidth =
        Number(document.getElementById("boxWidth").value);

    const pxPerCm = PERSON_PIXEL_HEIGHT / humanHeight;

    // 人
    person.style.height = PERSON_PIXEL_HEIGHT + "px";

    // 箱サイズ
    box.style.width = (boxWidth * pxPerCm) + "px";
    box.style.height = (boxHeight * pxPerCm) + "px";

    // 箱位置（変更しない）
    box.style.left = boxLeft + "px";
    box.style.bottom = boxBottom + "px";

    // ラベル
    label.style.left = boxLeft + "px";
    label.style.bottom =
    (boxBottom + box.offsetHeight + 5) + "px";
    label.style.width = box.offsetWidth + "px";

    document.getElementById("humanLabel").textContent =
        `人：${humanHeight} cm`;

    label.textContent =
        `${boxWidth} × ${boxHeight} cm`;
}

draw();


// ------------------------
// ドラッグ
// ------------------------

let dragging = false;

let startMouseX;
let startMouseY;

let startLeft;
let startBottom;

box.addEventListener("mousedown",(e)=>{

    dragging = true;

    startMouseX = e.clientX;
    startMouseY = e.clientY;

    startLeft = boxLeft;
    startBottom = boxBottom;

    e.preventDefault();

});

document.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    const dx = e.clientX - startMouseX;
    const dy = e.clientY - startMouseY;

    boxLeft = startLeft + dx;
    boxBottom = startBottom - dy;

    box.style.left = boxLeft + "px";
    box.style.bottom = boxBottom + "px";

    label.style.left = boxLeft + "px";
    label.style.bottom =
    (boxBottom + box.offsetHeight + 5) + "px";

});

document.addEventListener("mouseup",()=>{

    dragging = false;

});

box.addEventListener("dblclick", () => {

    boxBottom = 23;

    box.style.bottom = boxBottom + "px";

   label.style.bottom =
    (boxBottom + box.offsetHeight + 5) + "px";

});
</script>

</body>
</html>
